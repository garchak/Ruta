<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ruta Activa</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07090f">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090f; --surface: #0f1420; --surface2: #161e2e; --border: #1e2a3f;
  --blue: #3b82f6; --blue-bright: #60a5fa; --indigo: #a78bfa; --cyan: #22d3ee;
  --green: #10b981; --green-bright: #34d399; --amber: #f59e0b; --orange: #f97316;
  --red: #f87171; --red-bright: #ef4444; --pink: #ec4899;
  --text: #f1f5f9; --text2: #94a3b8; --muted: #475569; --faint: #1e2a3f;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* Header */
#header { background: linear-gradient(160deg, #0e1628 0%, #07090f 100%); border-bottom: 1px solid var(--border); padding: 14px 18px 10px; flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.brand { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .15em; background: linear-gradient(90deg, var(--cyan), var(--blue-bright)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; font-weight: 500; }
.stats-pill { border-radius: 99px; padding: 3px 11px; font-size: 11px; font-family: 'JetBrains Mono', monospace; border: 1px solid; }
.progress-bar { background: var(--faint); border-radius: 99px; height: 4px; overflow: hidden; margin-bottom: 8px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--blue), var(--indigo)); border-radius: 99px; transition: width .6s ease; box-shadow: 0 0 8px rgba(96,165,250,.4); }
.gps-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.gps-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.gps-dot.active { background: var(--green-bright); box-shadow: 0 0 8px var(--green-bright); animation: pulse 2.5s infinite; }
.gps-dot.waiting { background: var(--amber); box-shadow: 0 0 6px rgba(245,158,11,.5); }
.gps-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

/* Tabs */
.tabs { display: flex; padding: 8px 18px 0; flex-shrink: 0; background: var(--bg); gap: 8px; }
.tab { flex: 1; padding: 9px; font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 600; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; text-align: center; transition: all .2s; }
.tab.active { color: #fff; background: linear-gradient(135deg, var(--blue), var(--indigo)); border-color: transparent; box-shadow: 0 4px 14px rgba(59,130,246,.3); }

/* Body */
#body { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }

/* Nearest card */
.nearest-card { border-radius: 22px; padding: 22px; position: relative; overflow: hidden; background: linear-gradient(145deg, rgba(34,211,238,.13) 0%, rgba(59,130,246,.08) 50%, #070c18 100%); border: 1px solid rgba(34,211,238,.3); box-shadow: 0 8px 32px rgba(34,211,238,.1), inset 0 1px 0 rgba(34,211,238,.08); }
.nearest-card.av { background: linear-gradient(145deg, rgba(236,72,153,.18) 0%, rgba(239,68,68,.1) 50%, #0d0710 100%); border-color: rgba(236,72,153,.45); box-shadow: 0 8px 32px rgba(236,72,153,.15), inset 0 1px 0 rgba(236,72,153,.1); }
.nearest-card::after { content: ''; position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(34,211,238,.15) 0%, transparent 60%); border-radius: 50%; pointer-events: none; }
.nearest-card.av::after { background: radial-gradient(circle, rgba(236,72,153,.18) 0%, transparent 60%); }
.nearest-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.nearest-label { font-size: 9px; letter-spacing: .18em; color: var(--cyan); text-transform: uppercase; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.nearest-card.av .nearest-label { color: var(--pink); }
.type-pill { font-size: 11px; font-weight: 800; padding: 4px 12px; border-radius: 99px; letter-spacing: .08em; }
.type-pill.av { background: linear-gradient(135deg, rgba(236,72,153,.35), rgba(239,68,68,.3)); color: #fff; border: 1px solid rgba(236,72,153,.5); }
.type-pill.rv { background: linear-gradient(135deg, rgba(34,211,238,.3), rgba(59,130,246,.25)); color: #fff; border: 1px solid rgba(34,211,238,.45); }
.nearest-name { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.35; margin-bottom: 14px; }
.nearest-dist { font-size: 54px; font-weight: 200; letter-spacing: -.05em; line-height: 1; margin-bottom: 20px; font-family: 'JetBrains Mono', monospace; background: linear-gradient(90deg, var(--cyan), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nearest-card.av .nearest-dist { background: linear-gradient(90deg, var(--pink), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nearest-dist span { font-size: 20px; font-weight: 400; }
.btn-visit { width: 100%; padding: 16px; background: linear-gradient(135deg, rgba(34,211,238,.25), rgba(59,130,246,.35)); color: #fff; border: 1px solid rgba(34,211,238,.4); border-radius: 14px; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: opacity .15s, transform .1s; -webkit-appearance: none; box-shadow: 0 4px 16px rgba(34,211,238,.2), inset 0 1px 0 rgba(255,255,255,.1); }
.nearest-card.av .btn-visit { background: linear-gradient(135deg, rgba(236,72,153,.3), rgba(239,68,68,.35)); border-color: rgba(236,72,153,.45); box-shadow: 0 4px 16px rgba(236,72,153,.25); }
.btn-visit:active { opacity: .8; transform: scale(.98); }
.remaining-hint { font-size: 11px; color: rgba(255,255,255,.35); text-align: center; margin-top: 10px; font-family: 'JetBrains Mono', monospace; }

/* Section label */
.section-label { font-size: 9px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; font-weight: 700; padding: 4px 2px 2px; }

/* Next items */
.next-item { border-radius: 14px; padding: 13px 15px; display: flex; justify-content: space-between; align-items: center; gap: 8px; border: 1px solid transparent; }
.next-item.rv { background: linear-gradient(135deg, rgba(34,211,238,.1), rgba(59,130,246,.06)); border-color: rgba(34,211,238,.2); }
.next-item.av { background: linear-gradient(135deg, rgba(236,72,153,.12), rgba(239,68,68,.07)); border-color: rgba(236,72,153,.22); }
.next-item-left { display: flex; align-items: center; gap: 9px; flex: 1; min-width: 0; }
.next-type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.next-type-dot.av { background: var(--pink); box-shadow: 0 0 7px var(--pink); }
.next-type-dot.rv { background: var(--cyan); box-shadow: 0 0 7px rgba(34,211,238,.6); }
.next-item-name { font-size: 14px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.next-item-dist { font-size: 14px; font-weight: 700; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
.next-item.rv .next-item-dist { color: var(--cyan); }
.next-item.av .next-item-dist { color: var(--pink); }

/* State card */
.state-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 40px 20px; text-align: center; }
.state-icon { font-size: 40px; margin-bottom: 12px; }
.state-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.state-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* List items */
.list-item { border-radius: 16px; padding: 15px 16px; transition: opacity .3s; position: relative; border: 1px solid transparent; }
.list-item-rv { background: linear-gradient(135deg, rgba(34,211,238,.1), rgba(59,130,246,.06)); border-color: rgba(34,211,238,.2); box-shadow: 0 2px 12px rgba(34,211,238,.06); }
.list-item-av { background: linear-gradient(135deg, rgba(236,72,153,.13), rgba(239,68,68,.08)); border-color: rgba(236,72,153,.25); box-shadow: 0 2px 12px rgba(236,72,153,.07); }
.list-item.is-nearest.list-item-rv { border-color: rgba(34,211,238,.5); box-shadow: 0 0 20px rgba(34,211,238,.15); }
.list-item.is-nearest.list-item-av { border-color: rgba(236,72,153,.55); box-shadow: 0 0 20px rgba(236,72,153,.18); }
.list-item.is-visited { opacity: .25; }
.list-main { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.list-addr-text { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.4; flex: 1; min-width: 0; }
.list-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.list-dist { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.list-item-rv .list-dist { color: var(--cyan); }
.list-item-av .list-dist { color: var(--pink); }
.tags-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
.tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 99px; }
.tag-av { background: rgba(236,72,153,.25); color: #fff; border: 1px solid rgba(236,72,153,.45); }
.tag-rv { background: rgba(34,211,238,.2); color: #fff; border: 1px solid rgba(34,211,238,.4); }
.tag-rutina { background: rgba(167,139,250,.15); color: #c4b5fd; border: 1px solid rgba(167,139,250,.25); }
.tag-man { background: rgba(251,191,36,.12); color: #fcd34d; border: 1px solid rgba(251,191,36,.25); }
.tag-pub1 { background: rgba(34,211,238,.1); color: var(--cyan); border: 1px solid rgba(34,211,238,.2); }
.tag-pub0 { background: rgba(100,116,139,.1); color: #94a3b8; border: 1px solid rgba(100,116,139,.2); }
.btn-delete { background: transparent; border: none; color: rgba(255,255,255,.25); font-size: 13px; cursor: pointer; padding: 2px 4px; line-height: 1; transition: color .15s; font-weight: 600; }
.btn-delete:active { color: var(--red); }
.btn-small { margin-top: 12px; width: 100%; padding: 10px; background: rgba(255,255,255,.05); color: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; font-size: 13px; font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer; transition: all .15s; -webkit-appearance: none; }
.btn-small.highlight { background: linear-gradient(135deg, rgba(34,211,238,.25), rgba(59,130,246,.3)); color: #fff; border-color: rgba(34,211,238,.4); box-shadow: 0 3px 10px rgba(34,211,238,.2); }
.list-item-av .btn-small.highlight { background: linear-gradient(135deg, rgba(236,72,153,.3), rgba(239,68,68,.25)); border-color: rgba(236,72,153,.45); box-shadow: 0 3px 10px rgba(236,72,153,.2); }

/* Footer */
#footer { background: var(--bg); border-top: 1px solid var(--border); padding: 10px 18px; padding-bottom: max(10px, env(safe-area-inset-bottom)); display: flex; gap: 8px; flex-shrink: 0; }
.btn-footer { flex: 1; padding: 13px 6px; border: none; border-radius: 12px; font-size: 12px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; -webkit-appearance: none; transition: opacity .15s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 5px; }
.btn-footer:active { opacity: .8; transform: scale(.97); }
.btn-footer.import { background: linear-gradient(135deg, var(--blue), var(--indigo)); color: #fff; box-shadow: 0 3px 12px rgba(59,130,246,.3); }
.btn-footer.export { background: linear-gradient(135deg, var(--green), var(--cyan)); color: #fff; box-shadow: 0 3px 12px rgba(16,185,129,.3); }
.btn-footer.add { background: linear-gradient(135deg, var(--orange), var(--amber)); color: #fff; box-shadow: 0 3px 12px rgba(249,115,22,.3); }
.btn-footer.clear { background: rgba(239,68,68,.1); color: var(--red); border: 1px solid rgba(239,68,68,.2); flex: 0; padding: 13px 14px; }

/* Error banner */
.error-banner { background: linear-gradient(135deg, #2d0a0a, #1a0810); color: #fca5a5; font-size: 12px; padding: 9px 18px; text-align: center; flex-shrink: 0; border-top: 1px solid rgba(248,113,113,.2); }

/* Overlays */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: flex; align-items: flex-end; z-index: 100; backdrop-filter: blur(6px); }
.sheet { background: linear-gradient(160deg, #111827 0%, #0f1420 100%); border-radius: 24px 24px 0 0; padding: 24px 20px max(24px, env(safe-area-inset-bottom)); width: 100%; max-height: 90dvh; overflow-y: auto; border-top: 1px solid var(--border); }
.sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.sheet-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.field { margin-bottom: 14px; }
.field-label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 6px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; }
.field-input, .field-select { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; font-size: 14px; font-family: 'Inter', sans-serif; -webkit-appearance: none; appearance: none; outline: none; transition: border-color .2s, box-shadow .2s; }
.field-input:focus, .field-select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
.field-input::placeholder { color: var(--muted); }
.hint-box { background: rgba(59,130,246,.06); border: 1px solid rgba(59,130,246,.15); border-radius: 10px; padding: 11px 13px; font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 16px; }
.btn-confirm { width: 100%; padding: 14px; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; -webkit-appearance: none; margin-bottom: 10px; transition: opacity .15s; }
.btn-confirm.blue { background: linear-gradient(135deg, var(--blue), var(--indigo)); box-shadow: 0 4px 14px rgba(59,130,246,.3); }
.btn-confirm.green { background: linear-gradient(135deg, var(--green), var(--cyan)); box-shadow: 0 4px 14px rgba(16,185,129,.3); }
.btn-confirm.red { background: linear-gradient(135deg, var(--pink), var(--red-bright)); box-shadow: 0 4px 14px rgba(236,72,153,.3); }
.btn-confirm:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }
.btn-cancel-sheet { width: 100%; padding: 13px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 12px; font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer; -webkit-appearance: none; font-weight: 500; }
.add-status { font-size: 12px; min-height: 18px; margin-bottom: 10px; font-family: 'JetBrains Mono', monospace; }
.suggestion-item { padding: 11px 13px; font-size: 13px; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--border); line-height: 1.4; }
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:active { background: var(--surface2); }
.sug-main { font-size: 13px; color: var(--text); font-weight: 500; }
.sug-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-top">
      <div class="brand">📍 Ruta Activa</div>
      <div style="display:flex;gap:6px;align-items:center">
        <div class="stats-pill" id="stats-visited" style="background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(34,211,238,.15));border-color:rgba(34,211,238,.25);color:var(--green-bright)">✓ 0</div>
        <div class="stats-pill" id="stats-pending" style="background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(249,115,22,.1));border-color:rgba(251,191,36,.25);color:#fcd34d">⏳ 0</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="gps-row" style="margin-top:8px">
      <div class="gps-dot waiting" id="gps-dot"></div>
      <span id="gps-text">Solicitando GPS…</span>
      <button id="gps-refresh" onclick="refreshGPS()" style="display:none;margin-left:auto;background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.25);color:var(--cyan);border-radius:6px;padding:2px 8px;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;line-height:1.6">↻ actualizar</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-field" onclick="setView('field')">🎯 Campo</button>
    <button class="tab" id="tab-list" onclick="setView('list')">📋 Lista</button>
  </div>
  <div id="body"></div>
  <div id="footer">
    <button class="btn-footer import" onclick="document.getElementById('file-input').click()">⬆ Importar</button>
    <button class="btn-footer export" id="btn-export" onclick="exportJSON()" style="display:none">⬇ Exportar</button>
    <button class="btn-footer add" onclick="openAddOverlay()">＋ Añadir</button>
    <button class="btn-footer clear" id="btn-clear" onclick="clearAll()" style="display:none">🗑</button>
    <input type="file" id="file-input" accept=".json,.ods,.xlsx,.xls,.csv,application/json,application/vnd.oasis.opendocument.spreadsheet,text/*" style="display:none" onchange="handleFile(event)">
  </div>
  <div class="error-banner" id="error-banner" style="display:none"></div>
</div>

<!-- Confirm overlay -->
<div class="overlay" id="confirm-overlay" style="display:none">
  <div class="sheet" style="text-align:center">
    <div style="font-size:28px;margin-bottom:12px" id="confirm-icon"></div>
    <div class="sheet-title" id="confirm-title" style="margin-bottom:8px"></div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5" id="confirm-desc"></div>
    <button class="btn-confirm" id="confirm-ok" onclick="confirmAction()"></button>
    <button class="btn-cancel-sheet" onclick="cancelConfirm()">Cancelar</button>
  </div>
</div>

<!-- Column config overlay -->
<div class="overlay" id="col-overlay" style="display:none">
  <div class="sheet">
    <div class="sheet-title">⚙ Configurar columnas</div>
    <div class="sheet-sub" id="col-row-count"></div>
    <div class="field"><label class="field-label">Nombre / Etiqueta</label><select class="field-select" id="sel-name"></select></div>
    <div class="field"><label class="field-label">Latitud</label><select class="field-select" id="sel-lat"></select></div>
    <div class="field"><label class="field-label">Longitud</label><select class="field-select" id="sel-lon"></select></div>
    <div class="field"><label class="field-label">Dirección de texto</label><select class="field-select" id="sel-addr"></select></div>
    <div class="hint-box">💡 Si tienes lat/lon se usan directamente. Si solo tienes texto, se geocodifica vía OpenStreetMap.</div>
    <button class="btn-confirm blue" onclick="confirmImport()">Importar →</button>
    <button class="btn-cancel-sheet" onclick="cancelImport()">Cancelar</button>
  </div>
</div>

<!-- Add address overlay -->
<div class="overlay" id="add-overlay" style="display:none">
  <div class="sheet">
    <div class="sheet-title">➕ Añadir dirección</div>
    <div class="field" style="position:relative;margin-bottom:4px">
      <label class="field-label">Dirección (provincia de Barcelona)</label>
      <input class="field-input" id="add-addr" type="text" placeholder="Ej: Abad Oliva 24, Barberà del Vallès" autocomplete="off" oninput="onAddrInput()">
      <div id="suggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg);border:1px solid var(--blue);border-top:none;border-radius:0 0 8px 8px;z-index:200;max-height:200px;overflow-y:auto"></div>
    </div>
    <div class="add-status" id="add-status"></div>
    <div id="manual-coords-section" style="display:none">
      <div style="font-size:11px;color:var(--amber);margin-bottom:10px;line-height:1.6">No se encontró automáticamente.<br>Abre Google Maps, mantén pulsado y copia las coordenadas.</div>
      <button class="btn-confirm blue" style="margin-bottom:8px" onclick="openGoogleMaps()">Abrir Google Maps 🗺</button>
      <div class="field">
        <label class="field-label">Coordenadas (lat, lon)</label>
        <input class="field-input" id="add-coords" type="text" placeholder="41.50123, 2.01456" autocomplete="off">
      </div>
      <button class="btn-confirm green" onclick="confirmManualCoords()">Guardar coordenadas</button>
    </div>
    <button class="btn-confirm green" id="btn-add-confirm" onclick="confirmAddAddress()">Añadir a la ruta</button>
    <button class="btn-cancel-sheet" onclick="closeAddOverlay()">Cancelar</button>
  </div>
</div>

<!-- AV/RV type overlay -->
<div class="overlay" id="type-overlay" style="display:none">
  <div class="sheet">
    <div class="sheet-title" style="margin-bottom:6px">¿Tipo de visita?</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="type-addr-preview"></div>
    <button class="btn-confirm red" style="font-size:16px;padding:18px" onclick="confirmType('AV')">AV</button>
    <button class="btn-confirm blue" style="font-size:16px;padding:18px" onclick="confirmType('RV')">RV</button>
    <button class="btn-cancel-sheet" onclick="cancelType()">Cancelar</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
var locations = [];
var userPos = null;
var currentView = 'field';
var rawRows = null;
var geocodingActive = false;

// ── Storage ────────────────────────────────────────────────────────────────────
function saveLocations() {
  try { localStorage.setItem('route-locations', JSON.stringify(locations)); } catch(e) {}
}
function loadLocations() {
  try { var s = localStorage.getItem('route-locations'); if (s) locations = JSON.parse(s); } catch(e) {}
}

// ── Math ───────────────────────────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function fmtDist(km) { return km < 1 ? Math.round(km*1000) + ' m' : km.toFixed(1) + ' km'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── GPS ────────────────────────────────────────────────────────────────────────
var GPS_INTERVAL = 5 * 60 * 1000; // 5 minutes
var lastGPSUpdate = 0;
var lastUpdateTime = null;

function startGPS() {
  if (!navigator.geolocation) { setGPSStatus('error', 'GPS no disponible'); return; }
  // Initial fix immediately
  fetchGPSPosition();
  // Then throttle to every 5 minutes
  setInterval(fetchGPSPosition, GPS_INTERVAL);
}

function fetchGPSPosition() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      lastUpdateTime = new Date();
      var timeStr = lastUpdateTime.getHours() + ':' + String(lastUpdateTime.getMinutes()).padStart(2,'0');
      setGPSStatus('active', pos.coords.latitude.toFixed(4) + ', ' + pos.coords.longitude.toFixed(4) + '  ' + timeStr);
      document.getElementById('gps-refresh').style.display = '';
      renderBody();
    },
    function(err) {
      var msgs = { 1:'Permiso denegado — activa el GPS en ajustes', 2:'Señal GPS no disponible', 3:'Timeout GPS' };
      setGPSStatus('error', msgs[err.code] || 'Error GPS');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: GPS_INTERVAL }
  );
}

function refreshGPS() {
  var btn = document.getElementById('gps-refresh');
  btn.textContent = '↻ …';
  btn.style.opacity = '.5';
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      lastUpdateTime = new Date();
      var timeStr = lastUpdateTime.getHours() + ':' + String(lastUpdateTime.getMinutes()).padStart(2,'0');
      setGPSStatus('active', pos.coords.latitude.toFixed(4) + ', ' + pos.coords.longitude.toFixed(4) + '  ' + timeStr);
      btn.textContent = '↻ actualizar';
      btn.style.opacity = '1';
      renderBody();
    },
    function(err) {
      btn.textContent = '↻ actualizar';
      btn.style.opacity = '1';
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function setGPSStatus(s, t) {
  document.getElementById('gps-dot').className = 'gps-dot ' + s;
  document.getElementById('gps-text').textContent = t;
}

// ── Priority ───────────────────────────────────────────────────────────────────
// AV(1000) > PUBLIC(100) > RUTINA C=0/M=1(10) > MANIOBRA 3-x(1) → lower = higher priority
function priorityScore(loc) {
  var isAV  = loc.type === 'AV' ? 0 : 1;
  var pub   = (loc.public == null || loc.public === '') ? 1 : (parseInt(loc.public) === 1 ? 0 : 1);
  var rut   = String(loc.rutina || '').trim().toUpperCase() === 'C' ? 0 : 1;
  var man   = (loc.maniobra == null || loc.maniobra === '') ? 4 : (3 - parseInt(loc.maniobra));
  return isAV*1000 + pub*100 + rut*10 + man;
}

function locationKey(loc) {
  if (loc.lat != null && loc.lon != null)
    return Math.round(loc.lat*10000) + ',' + Math.round(loc.lon*10000);
  return String(loc.address || loc.name || '').toLowerCase().trim();
}

function getNearest() {
  if (!userPos) return null;
  var ready = locations.filter(function(l) { return l.status === 'ready'; });
  if (!ready.length) return null;
  var avReady = ready.filter(function(l) { return l.type === 'AV'; });
  var pool = avReady.length ? avReady : ready;
  var groups = {};
  pool.forEach(function(loc) {
    var key = locationKey(loc);
    var s = priorityScore(loc);
    var d = haversine(userPos.lat, userPos.lon, loc.lat, loc.lon);
    if (!groups[key] || s < groups[key].score || (s === groups[key].score && d < groups[key].dist))
      groups[key] = { score: s, dist: d, loc: Object.assign({}, loc, { dist: d }) };
  });
  var best = null, bestScore = Infinity, bestDist = Infinity;
  Object.keys(groups).forEach(function(k) {
    var g = groups[k];
    if (g.score < bestScore || (g.score === bestScore && g.dist < bestDist)) {
      best = g.loc; bestScore = g.score; bestDist = g.dist;
    }
  });
  return best;
}

// ── Confirm overlay ────────────────────────────────────────────────────────────
var pendingAction = null;
function openConfirm(icon, title, desc, btnLabel, btnClass, action) {
  pendingAction = action;
  document.getElementById('confirm-icon').textContent = icon;
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-desc').textContent = desc;
  var btn = document.getElementById('confirm-ok');
  btn.textContent = btnLabel;
  btn.className = 'btn-confirm ' + btnClass;
  // Remove any extra buttons from previous confirm
  var sheet = btn.parentNode;
  Array.from(sheet.querySelectorAll('.extra-confirm-btn')).forEach(function(el) { el.remove(); });
  document.getElementById('confirm-overlay').style.display = 'flex';
}
function confirmAction() {
  document.getElementById('confirm-overlay').style.display = 'none';
  if (pendingAction) { pendingAction(); pendingAction = null; }
}
function cancelConfirm() {
  document.getElementById('confirm-overlay').style.display = 'none';
  pendingAction = null;
}

function markVisited(id) {
  var loc = locations.find(function(l) { return l.id === id; });
  if (!loc) return;
  openConfirm('✓', '¿Marcar como visitada?', (loc.address || loc.name || '').slice(0, 60), 'Confirmar', 'green', function() {
    var idx = locations.findIndex(function(l) { return l.id === id; });
    if (idx !== -1) { locations[idx].status = 'visited'; saveLocations(); render(); playChime(); }
  });
}
function deleteLocation(id) {
  var loc = locations.find(function(l) { return l.id === id; });
  if (!loc) return;
  openConfirm('🗑', '¿Eliminar?', (loc.address || loc.name || '').slice(0, 60), 'Eliminar', 'red', function() {
    locations = locations.filter(function(l) { return l.id !== id; });
    saveLocations(); render();
  });
}
function clearAll() {
  openConfirm('🗑', '¿Borrar todo?', 'Se eliminarán todas las direcciones. No se puede deshacer.', 'Borrar todo', 'red', function() {
    locations = []; saveLocations(); render();
  });
}

// ── Sound ──────────────────────────────────────────────────────────────────────
function playChime() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Two-note chime: C5 then E5
    [[523.25, 0], [659.25, 0.18]].forEach(function(note) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = note[0];
      var t = ctx.currentTime + note[1];
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    });
  } catch(e) {}
}

// ── View / Render ──────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('tab-field').className = 'tab' + (v==='field'?' active':'');
  document.getElementById('tab-list').className = 'tab' + (v==='list'?' active':'');
  render();
}

function render() {
  var total = locations.length;
  var visited = locations.filter(function(l) { return l.status === 'visited'; }).length;
  document.getElementById('stats-visited').textContent = '✓ ' + visited;
  document.getElementById('stats-pending').textContent = '⏳ ' + (total - visited);
  document.getElementById('progress-fill').style.width = (total ? (visited/total*100) : 0) + '%';
  document.getElementById('btn-clear').style.display = total ? '' : 'none';
  document.getElementById('btn-export').style.display = total ? '' : 'none';
  renderBody();
}

function renderBody() {
  var bodyEl = document.getElementById('body');
  // Save scroll position in list view
  var scrollTop = currentView === 'list' ? bodyEl.scrollTop : 0;
  bodyEl.innerHTML = '';
  currentView === 'field' ? renderField(bodyEl) : renderList(bodyEl);
  // Restore scroll position
  if (currentView === 'list' && scrollTop > 0) bodyEl.scrollTop = scrollTop;
}

function renderField(body) {
  var nearest = getNearest();
  var total = locations.length;
  var visited = locations.filter(function(l) { return l.status === 'visited'; }).length;
  var ready = locations.filter(function(l) { return l.status === 'ready'; });
  if (!nearest) {
    var card = document.createElement('div');
    card.className = 'state-card';
    if (!total) card.innerHTML = '<div class="state-icon">📂</div><div class="state-title">Sin ubicaciones</div><div class="state-sub">Importa un ODS/JSON o pulsa ＋</div>';
    else if (visited === total) card.innerHTML = '<div class="state-icon">🎉</div><div class="state-title">¡Ruta completada!</div><div class="state-sub">Has visitado las ' + total + ' ubicaciones.</div>';
    else card.innerHTML = '<div class="state-icon">📡</div><div class="state-title">Esperando GPS…</div><div class="state-sub">Activa el GPS y los permisos de ubicación.</div>';
    body.appendChild(card); return;
  }
  var isAV = nearest.type === 'AV';
  var nc = document.createElement('div');
  nc.className = 'nearest-card' + (isAV ? ' av' : '');
  var dv = nearest.dist < 1 ? Math.round(nearest.dist*1000) : nearest.dist.toFixed(1);
  var du = nearest.dist < 1 ? 'm' : 'km';

  // Group counter: how many pending at same location
  var nearestKey = locationKey(nearest);
  var groupTotal = ready.filter(function(l) { return locationKey(l) === nearestKey; }).length;
  var groupVisited = locations.filter(function(l) { return l.status === 'visited' && locationKey(l) === nearestKey; }).length;
  var groupDone = groupTotal > 0 ? groupVisited : 0;
  var groupAll = groupTotal + groupVisited;
  var groupLabel = groupAll > 1 ? (groupDone+1) + ' de ' + groupAll + ' en este edificio' : '';

  nc.innerHTML =
    '<div class="nearest-top"><div class="nearest-label">Más cercana</div><span class="type-pill ' + (isAV?'av':'rv') + '">' + (nearest.type||'RV') + '</span></div>' +
    '<div class="nearest-name">' + esc(nearest.name || nearest.address) + '</div>' +
    (groupLabel ? '<div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:10px;font-family:\'JetBrains Mono\',monospace">📦 ' + groupLabel + '</div>' : '') +
    '<div class="nearest-dist">' + dv + '<span>' + du + '</span></div>' +
    '<button class="btn-visit" onclick="markVisited(' + nearest.id + ')">✓ Marcar como visitada</button>' +
    (ready.length > 1 ? '<div class="remaining-hint">' + (ready.length-1) + ' pendiente' + (ready.length-1>1?'s':'') + ' después</div>' : '');
  body.appendChild(nc);
  var nextItems = ready.filter(function(l) { return l.id !== nearest.id; })
    .map(function(l) { return Object.assign({}, l, { dist: haversine(userPos.lat, userPos.lon, l.lat, l.lon) }); })
    .sort(function(a, b) {
      var sa = priorityScore(a), sb = priorityScore(b);
      if (sa !== sb) return sa - sb;
      return a.dist - b.dist;
    }).slice(0, 3);
  if (nextItems.length) {
    var lbl = document.createElement('div');
    lbl.className = 'section-label'; lbl.textContent = 'Próximas';
    body.appendChild(lbl);
    nextItems.forEach(function(loc) {
      var el = document.createElement('div');
      el.className = 'next-item ' + (loc.type==='AV'?'av':'rv');
      el.innerHTML = '<div class="next-item-left"><div class="next-type-dot ' + (loc.type==='AV'?'av':'rv') + '"></div><div class="next-item-name">' + esc(loc.name||loc.address) + '</div></div><div class="next-item-dist">' + fmtDist(loc.dist) + '</div>';
      body.appendChild(el);
    });
  }
}

function renderList(body) {
  var nearest = getNearest();
  var groupScores = {}, groupDists = {};
  locations.forEach(function(loc) {
    if (loc.status === 'visited') return;
    var key = locationKey(loc);
    var s = priorityScore(loc);
    var d = userPos && loc.lat != null ? haversine(userPos.lat, userPos.lon, loc.lat, loc.lon) : Infinity;
    if (groupScores[key] === undefined || s < groupScores[key]) groupScores[key] = s;
    if (groupDists[key]  === undefined || d < groupDists[key])  groupDists[key]  = d;
  });
  var sorted = locations.filter(function(l) { return l.status !== 'visited'; }).sort(function(a, b) {
    var ka = locationKey(a), kb = locationKey(b);
    var gsa = groupScores[ka] !== undefined ? groupScores[ka] : priorityScore(a);
    var gsb = groupScores[kb] !== undefined ? groupScores[kb] : priorityScore(b);
    if (gsa !== gsb) return gsa - gsb;
    var gda = groupDists[ka] !== undefined ? groupDists[ka] : Infinity;
    var gdb = groupDists[kb] !== undefined ? groupDists[kb] : Infinity;
    if (Math.abs(gda-gdb) > 0.001) return gda - gdb;
    var sa = priorityScore(a), sb = priorityScore(b);
    if (sa !== sb) return sa - sb;
    if (!userPos || a.status !== 'ready' || b.status !== 'ready') return 0;
    return haversine(userPos.lat, userPos.lon, a.lat, a.lon) - haversine(userPos.lat, userPos.lon, b.lat, b.lon);
  });
  if (!sorted.length) {
    var card = document.createElement('div');
    card.className = 'state-card';
    card.innerHTML = '<div class="state-icon">📂</div><div class="state-title">Sin ubicaciones</div><div class="state-sub">Importa un ODS o pulsa ＋</div>';
    body.appendChild(card); return;
  }
  sorted.forEach(function(loc) {
    var isNearest = nearest && loc.id === nearest.id;
    var dist = userPos && loc.lat != null ? haversine(userPos.lat, userPos.lon, loc.lat, loc.lon) : null;
    var isAV = loc.type === 'AV';
    var item = document.createElement('div');
    item.className = 'list-item' + (isNearest?' is-nearest':'') + (isAV?' list-item-av':' list-item-rv');
    var rutina = String(loc.rutina || '').trim().toUpperCase() || 'M';
    var manVal = loc.maniobra != null && loc.maniobra !== '' ? String(loc.maniobra) : null;
    var pubVal = loc.public != null && loc.public !== '' ? parseInt(loc.public) : null;
    item.innerHTML =
      '<div class="list-main">' +
        '<div class="list-addr-text">' + esc(loc.name || loc.address) + '</div>' +
        '<div class="list-right">' +
          (dist !== null ? '<div class="list-dist">' + fmtDist(dist) + '</div>' : '') +
          '<div class="tags-row">' +
            '<span class="tag ' + (isAV?'tag-av':'tag-rv') + '">' + (loc.type||'RV') + '</span>' +
            '<span class="tag tag-rutina">' + rutina + '</span>' +
            (manVal !== null ? '<span class="tag tag-man">M' + esc(manVal) + '</span>' : '') +
            (pubVal !== null ? '<span class="tag ' + (pubVal===1?'tag-pub1':'tag-pub0') + '">P' + pubVal + '</span>' : '') +
          '</div>' +
          '<button class="btn-delete" onclick="deleteLocation(' + loc.id + ')">✕</button>' +
        '</div>' +
      '</div>' +
      (loc.status === 'ready' ? '<button class="btn-small' + (isNearest?' highlight':'') + '" onclick="markVisited(' + loc.id + ')">✓ Visitada</button>' : '');
    body.appendChild(item);
  });
}

// ── Geocoding ──────────────────────────────────────────────────────────────────
function normalizeAddress(a) {
  var abbr = {'\\bc/\\b':'Calle ','\\bav\\.?\\b':'Avenida ','\\bpza?\\.?\\b':'Plaza ','\\bcrta?\\.?\\b':'Carretera '};
  Object.keys(abbr).forEach(function(k) { a = a.replace(new RegExp(k,'gi'), abbr[k]); });
  return a.trim();
}
function fetchNominatim(params) {
  var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=es&accept-language=es&' +
    Object.keys(params).map(function(k) { return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
  return fetch(url).then(function(r){return r.json();})
    .then(function(d){return d.length?{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon)}:null;})
    .catch(function(){return null;});
}
function geocodeOne(address) {
  var s = normalizeAddress(address).replace(/,?\s*(españa|spain)$/i,'').trim();
  var parts = s.split(',').map(function(p){return p.trim();});
  var city = parts.length >= 2 ? parts[parts.length-1] : '';
  var street = parts.length >= 2 ? parts.slice(0,parts.length-1).join(', ') : s;
  var attempts = [];
  if (city) {
    attempts.push({street:street, city:city, country:'España'});
    var snn = street.replace(/\s+\d+$/,'').trim();
    if (snn !== street) attempts.push({street:snn, city:city, country:'España'});
  }
  attempts.push({q: s + ', Barcelona, España'});
  var noNum = s.replace(/\s+\d+/,'').trim();
  if (noNum !== s) attempts.push({q: noNum + ', Barcelona, España'});
  function tryNext(i) {
    if (i >= attempts.length) return Promise.resolve(null);
    return fetchNominatim(attempts[i]).then(function(r) {
      if (r) return r;
      return new Promise(function(res) { setTimeout(function(){res(tryNext(i+1));}, 700); });
    });
  }
  return tryNext(0);
}
function runGeocodingQueue() {
  if (geocodingActive) return;
  var pending = locations.filter(function(l){return l.status==='geocoding';});
  if (!pending.length) return;
  geocodingActive = true;
  var loc = pending[0];
  geocodeOne(loc.address).then(function(coords) {
    var idx = locations.findIndex(function(l){return l.id===loc.id;});
    if (idx !== -1) {
      if (coords) { locations[idx].lat=coords.lat; locations[idx].lon=coords.lon; locations[idx].status='ready'; }
      else { locations[idx].status='error'; }
      saveLocations(); render();
    }
    geocodingActive = false;
    setTimeout(runGeocodingQueue, 1200);
  });
}

// ── File import ────────────────────────────────────────────────────────────────
function handleFile(e) {
  var file = e.target.files[0];
  if (!file) return;
  var name = file.name ? file.name.toLowerCase() : '';
  var reader = new FileReader();
  if (name.endsWith('.json') || file.type === 'application/json') {
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!Array.isArray(data) || !data.length) { showError('JSON vacío o no válido.'); return; }
        var imported = data.map(function(l,i) { return Object.assign({},l,{id:Date.now()+i+Math.random()}); });
        locations = locations.concat(imported);
        saveLocations(); render(); runGeocodingQueue();
      } catch(err) { showError('No se pudo leer el JSON: ' + err.message); }
    };
    reader.readAsText(file, 'UTF-8');
  } else {
    // ODS / XLSX / XLS / CSV via XLSX.js — read cells directly
    reader.onload = function(ev) {
      try {
        var wb = XLSX.read(ev.target.result, { type: 'array' });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var range = XLSX.utils.decode_range(ws['!ref']);
        var headers = [];
        for (var c = range.s.c; c <= range.e.c; c++) {
          var hc = ws[XLSX.utils.encode_cell({r:0,c:c})];
          headers.push(hc ? String(hc.v||'').trim() : '');
        }
        rawRows = [];
        for (var r = range.s.r+1; r <= range.e.r; r++) {
          var row = {}, hasData = false;
          for (var c = range.s.c; c <= range.e.c; c++) {
            var cell = ws[XLSX.utils.encode_cell({r:r,c:c})];
            var val = '';
            if (cell) {
              val = cell.w !== undefined && cell.w !== null && String(cell.w).trim() !== '' ? String(cell.w).trim() :
                    cell.v !== undefined && cell.v !== null && String(cell.v).trim() !== '' ? String(cell.v).trim() : '';
              if (val) hasData = true;
            }
            row[headers[c-range.s.c]] = val;
          }
          if (hasData) rawRows.push(row);
        }
        if (!rawRows.length) { showError('El archivo está vacío.'); return; }
        openColConfig();
      } catch(err) { showError('No se pudo leer: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  }
  e.target.value = '';
}

function openColConfig() {
  // Build key map scanning all rows
  var allKeys = {};
  rawRows.forEach(function(row) {
    Object.keys(row).forEach(function(k) { allKeys[k.toLowerCase().trim()] = k; });
  });
  var coordKey  = allKeys['coordenadas'] || allKeys['coords'];
  var nameKey   = allKeys['nombre'] || allKeys['name'];
  var addrKey   = allKeys['direccion'] || allKeys['dirección'] || allKeys['direcció'];
  var latKey    = allKeys['latitud'] || allKeys['lat'];
  var lonKey    = allKeys['longitud'] || allKeys['lon'] || allKeys['lng'];
  var manKey    = allKeys['maniobra'];
  var pubKey    = allKeys['public'];
  var rutinaKey = allKeys['rutina'];
  var typeKey   = allKeys['tipo'] || allKeys['type'];

  if ((nameKey || addrKey) && (coordKey || (latKey && lonKey))) {
    var newLocs = rawRows.map(function(row, i) {
      var addr  = addrKey ? String(row[addrKey]||'').trim() : '';
      var name  = nameKey ? String(row[nameKey]||'').trim() : '';
      var label = name || addr;
      if (!label) return null;
      var lat = null, lon = null;
      if (coordKey && row[coordKey]) {
        var pts = String(row[coordKey]).split(',');
        if (pts.length >= 2) { var a=parseFloat(pts[0]),b=parseFloat(pts[1]); if(!isNaN(a)&&!isNaN(b)){lat=a;lon=b;} }
      }
      if (lat===null && latKey && lonKey) {
        var a=parseFloat(row[latKey]),b=parseFloat(row[lonKey]); if(!isNaN(a)&&!isNaN(b)){lat=a;lon=b;}
      }
      var type = 'RV';
      if (typeKey && row[typeKey]) type = String(row[typeKey]).trim().toUpperCase()==='AV'?'AV':'RV';
      // Rutina: try all key variants
      var rutinaVal = null;
      ['RUTINA','rutina','Rutina'].concat(rutinaKey ? [rutinaKey] : []).forEach(function(k) {
        if (!rutinaVal && row[k] && String(row[k]).trim()) rutinaVal = String(row[k]).trim().toUpperCase();
      });
      return {
        id: Date.now()+i+Math.random(), name:label, lat:lat, lon:lon, address:addr||name, type:type,
        status: lat!==null?'ready':'geocoding',
        maniobra: manKey ? row[manKey] : null,
        public:   pubKey ? row[pubKey] : null,
        rutina:   rutinaVal
      };
    }).filter(Boolean);

    if (newLocs.length) {
      rawRows = null;
      if (locations.length > 0) {
        openConfirm('📂','¿Cómo importar?', newLocs.length + ' ubicaciones. ¿Reemplazar o añadir?', 'Reemplazar', 'red', function() {
          locations = newLocs; saveLocations(); render(); runGeocodingQueue();
        });
        // Add merge button
        var mergeBtn = document.createElement('button');
        mergeBtn.className = 'btn-cancel-sheet extra-confirm-btn';
        mergeBtn.style.marginBottom = '8px';
        mergeBtn.textContent = 'Añadir a la lista';
        mergeBtn.onclick = function() {
          document.getElementById('confirm-overlay').style.display = 'none';
          locations = locations.concat(newLocs); saveLocations(); render(); runGeocodingQueue();
        };
        var okBtn = document.getElementById('confirm-ok');
        okBtn.parentNode.insertBefore(mergeBtn, okBtn.nextSibling);
      } else {
        locations = newLocs; saveLocations(); render(); runGeocodingQueue();
      }
      return;
    }
  }
  // Fallback: manual column config
  var keys = Object.keys(rawRows[0]);
  var NA = '— no usar —';
  var defs = {'sel-name':nameKey||'','sel-lat':latKey||'','sel-lon':lonKey||'','sel-addr':addrKey||''};
  var opts = [NA].concat(keys);
  Object.keys(defs).forEach(function(id) {
    document.getElementById(id).innerHTML = opts.map(function(k) {
      return '<option value="'+esc(k)+'"'+(k===defs[id]?' selected':'')+'>'+esc(k)+'</option>';
    }).join('');
  });
  document.getElementById('col-row-count').textContent = rawRows.length + ' filas detectadas:';
  document.getElementById('col-overlay').style.display = 'flex';
}

function cancelImport() { rawRows = null; document.getElementById('col-overlay').style.display = 'none'; }

function confirmImport() {
  var NA = '— no usar —';
  var nameCol = document.getElementById('sel-name').value;
  var latCol  = document.getElementById('sel-lat').value;
  var lonCol  = document.getElementById('sel-lon').value;
  var addrCol = document.getElementById('sel-addr').value;
  var newLocs = rawRows.map(function(row,i) {
    var hasCoords = latCol!==NA && lonCol!==NA && row[latCol]!=='' && row[lonCol]!=='';
    var hasAddr   = addrCol!==NA && row[addrCol]!=='';
    var name = nameCol!==NA ? String(row[nameCol]) : (hasAddr ? String(row[addrCol]) : 'Ubicación '+(i+1));
    return { id:Date.now()+i+Math.random(), name:name,
      lat:hasCoords?parseFloat(row[latCol]):null, lon:hasCoords?parseFloat(row[lonCol]):null,
      address:hasAddr?String(row[addrCol]):'', status:hasCoords?'ready':(hasAddr?'geocoding':'error') };
  }).filter(function(l){return l.status!=='error';});
  locations = locations.concat(newLocs);
  saveLocations(); document.getElementById('col-overlay').style.display = 'none';
  rawRows = null; render(); runGeocodingQueue();
}

// ── Autocomplete ───────────────────────────────────────────────────────────────
var suggestTimer = null, selectedSuggestion = null;
function onAddrInput() {
  var val = document.getElementById('add-addr').value.trim();
  selectedSuggestion = null; hideSuggestions();
  document.getElementById('add-status').textContent = '';
  document.getElementById('btn-add-confirm').style.display = '';
  document.getElementById('btn-add-confirm').disabled = false;
  document.getElementById('manual-coords-section').style.display = 'none';
  clearTimeout(suggestTimer);
  if (val.length < 4) return;
  suggestTimer = setTimeout(function() {
    fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(val+', Barcelona, España') +
      '&format=json&limit=5&countrycodes=es&accept-language=es&addressdetails=1')
      .then(function(r){return r.json();})
      .then(function(data) { if (data.length) showSuggestions(data); })
      .catch(function(){});
  }, 400);
}
function showSuggestions(data) {
  var box = document.getElementById('suggestions');
  box.innerHTML = '';
  data.forEach(function(item) {
    var a = item.address||{};
    var main = [a.road,a.house_number].filter(Boolean).join(' ') || item.display_name.split(',')[0];
    var sub  = [a.city||a.town||a.village||a.municipality,a.county].filter(Boolean).join(', ');
    var div = document.createElement('div');
    div.className = 'suggestion-item';
    div.innerHTML = '<div class="sug-main">'+esc(main)+'</div><div class="sug-sub">'+esc(sub)+'</div>';
    var label = main + (sub ? ', '+sub : '');
    div.addEventListener('touchstart', function(e){e.preventDefault();selectSuggestion(item,label);});
    div.addEventListener('mousedown',  function(e){e.preventDefault();selectSuggestion(item,label);});
    box.appendChild(div);
  });
  box.style.display = '';
}
function hideSuggestions() { document.getElementById('suggestions').style.display = 'none'; }
function selectSuggestion(item, label) {
  selectedSuggestion = { lat:parseFloat(item.lat), lon:parseFloat(item.lon) };
  document.getElementById('add-addr').value = label;
  hideSuggestions();
}

// ── Add address ────────────────────────────────────────────────────────────────
function openAddOverlay() {
  document.getElementById('add-addr').value = '';
  document.getElementById('add-status').textContent = '';
  document.getElementById('btn-add-confirm').disabled = false;
  document.getElementById('btn-add-confirm').style.display = '';
  document.getElementById('manual-coords-section').style.display = 'none';
  hideSuggestions(); selectedSuggestion = null;
  document.getElementById('add-overlay').style.display = 'flex';
  setTimeout(function(){document.getElementById('add-addr').focus();}, 150);
}
function closeAddOverlay() { document.getElementById('add-overlay').style.display = 'none'; }
function openGoogleMaps() {
  var addr = document.getElementById('add-addr').value.trim();
  window.open('https://www.google.com/maps/search/' + encodeURIComponent(addr+', Barcelona, España'), '_blank');
}
function confirmAddAddress() {
  var addr = document.getElementById('add-addr').value.trim();
  var statusEl = document.getElementById('add-status');
  var btn = document.getElementById('btn-add-confirm');
  if (!addr) { statusEl.style.color='var(--red)'; statusEl.textContent='⚠ Escribe una dirección.'; return; }
  if (selectedSuggestion) { openTypeOverlay(addr, selectedSuggestion.lat, selectedSuggestion.lon); return; }
  btn.disabled = true;
  statusEl.style.color = 'var(--amber)'; statusEl.textContent = '🔍 Buscando coordenadas…';
  geocodeOne(addr).then(function(coords) {
    if (!coords) {
      statusEl.textContent = ''; btn.style.display = 'none';
      document.getElementById('manual-coords-section').style.display = '';
      document.getElementById('add-coords').value = ''; return;
    }
    openTypeOverlay(addr, coords.lat, coords.lon);
  });
}
function confirmManualCoords() {
  var addr = document.getElementById('add-addr').value.trim();
  var raw = document.getElementById('add-coords').value.trim();
  var m = raw.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
  if (!m) { document.getElementById('add-coords').style.borderColor='var(--red)'; return; }
  openTypeOverlay(addr, parseFloat(m[1]), parseFloat(m[2]));
}

// ── AV/RV type ─────────────────────────────────────────────────────────────────
var pendingLocation = null;
function openTypeOverlay(addr, lat, lon) {
  pendingLocation = { addr:addr, lat:lat, lon:lon };
  document.getElementById('type-addr-preview').textContent = addr;
  document.getElementById('type-overlay').style.display = 'flex';
}
function confirmType(type) {
  document.getElementById('type-overlay').style.display = 'none';
  if (!pendingLocation) return;
  locations.push({ id:Date.now()+Math.random(), name:pendingLocation.addr, lat:pendingLocation.lat, lon:pendingLocation.lon, address:pendingLocation.addr, type:type, status:'ready' });
  saveLocations(); closeAddOverlay(); render();
  pendingLocation = null;
}
function cancelType() { document.getElementById('type-overlay').style.display = 'none'; pendingLocation = null; }

// ── Export ─────────────────────────────────────────────────────────────────────
function exportJSON() {
  if (!locations.length) return;
  var blob = new Blob([JSON.stringify(locations, null, 2)], { type:'application/json;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'ruta-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
}

function showError(msg) {
  var b = document.getElementById('error-banner');
  b.textContent = msg; b.style.display = '';
  setTimeout(function(){b.style.display='none';}, 4000);
}

// ── Init ───────────────────────────────────────────────────────────────────────
// ── Service Worker ─────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  });
}

loadLocations();
render();
startGPS();
runGeocodingQueue();
</script>
</body>
